<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LawMate – Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.tab-btn{padding:7px 16px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-mid);font-family:'Inter',sans-serif}
.tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.task-item{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:18px 20px;display:flex;align-items:flex-start;gap:14px;margin-bottom:10px;transition:box-shadow .2s}
.task-item:hover{box-shadow:0 4px 14px rgba(0,0,0,0.06)}
.task-check{width:22px;height:22px;border:2px solid #d1d5db;border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;margin-top:1px}
.task-check.done{background:#f59e0b;border-color:#f59e0b}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:32px;width:100%;max-width:480px}
.modal h2{font-family:'Playfair Display',serif;font-size:22px;color:#0f172a;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:7px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:9px;font-size:14px;font-family:'Inter',sans-serif;outline:none}
.form-group input:focus,.form-group select:focus{border-color:#f59e0b}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{padding:10px 20px;border:1.5px solid #e5e7eb;border-radius:9px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-primary{padding:10px 20px;border:none;border-radius:9px;background:#0f172a;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <header class="topbar">
    <span class="topbar-title">Lawyer Dashboard</span>
    <div class="topbar-right">
     <!-- <div class="search-bar"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Search...<span class="search-kbd">⌘K</span></div>
      <button class="notif-btn"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-dot" id="notifDot" style="display:none"></span></button>-->
      <div class="user-badge"><div class="avatar"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div><span id="topbarName">...</span></div>
    </div>
  </header>
  <div class="page-content">
    <div class="page-header"><h1>Tasks</h1><p>Manage your personal to-do list</p></div>
    <!-- STATS -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px">
      <div class="stat-card"><div><div class="stat-label">Pending</div><div class="stat-val" id="s-pending" style="color:#f59e0b">—</div></div><div class="stat-icon si-orange"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div></div>
      <div class="stat-card"><div><div class="stat-label">In Progress</div><div class="stat-val" id="s-inprog" style="color:#3b82f6">—</div></div><div class="stat-icon si-blue"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.5"/></svg></div></div>
      <div class="stat-card"><div><div class="stat-label">Completed</div><div class="stat-val" id="s-done" style="color:#16a34a">—</div></div><div class="stat-icon si-green"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div style="display:flex;gap:6px">
        <button class="tab-btn active" onclick="setTab('all',this)">All</button>
        <button class="tab-btn" onclick="setTab('pending',this)">Pending</button>
        <button class="tab-btn" onclick="setTab('in_progress',this)">In Progress</button>
        <button class="tab-btn" onclick="setTab('completed',this)">Completed</button>
      </div>
      <button onclick="openModal()" style="padding:9px 18px;border-radius:9px;border:none;background:#0f172a;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif">+ Add Task</button>
    </div>
    <div id="tasksList"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <h2>Add Task</h2>
    <div class="form-group"><label>Case *</label><select id="m-case"><option value="">— Select Case —</option></select></div>
    <div class="form-group"><label>Task Title *</label><input id="m-title" placeholder="Prepare property valuation report"></div>
    <div class="form-group"><label>Description</label><textarea id="m-desc" rows="2" placeholder="Optional details..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Due Date</label><input type="date" id="m-due"></div>
      <div class="form-group"><label>Priority</label><select id="m-priority"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="createTask()">Add Task</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="_sidebar.js"></script>
<script>
let allTasks = [];
let currentTab = 'all';

const priColor = { high:'#dc2626', medium:'#f59e0b', low:'#3b82f6' };
const priLabel = { high:'High', medium:'Medium', low:'Low' };

function taskHTML(t) {
  const overdue = t.due_date && new Date(t.due_date) < new Date() && t.status !== 'completed';
  const done    = t.status === 'completed';
  return `
    <div class="task-item">
      <div class="task-check ${done?'done':''}" onclick="toggleTask('${t.id}','${t.status}')">
        ${done?`<svg width="12" height="12" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`:''}
      </div>
      <div style="flex:1">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
          <div style="font-size:14px;font-weight:600;color:#0f172a;${done?'text-decoration:line-through;color:#9ca3af':''}">${t.title}</div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <span style="background:${priColor[t.priority]}22;color:${priColor[t.priority]};padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700">${priLabel[t.priority]}</span>
            <span style="background:${t.status==='completed'?'#dcfce7':t.status==='in_progress'?'#dbeafe':'#fef9c3'};color:${t.status==='completed'?'#16a34a':t.status==='in_progress'?'#2563eb':'#a16207'};padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700">${t.status.replace('_',' ')}</span>
          </div>
        </div>
        <div style="font-size:12px;color:#9ca3af;margin-top:3px">${t.case?.case_number||'—'}</div>
        ${t.description ? `<div style="font-size:13px;color:#6b7280;margin-top:4px">${t.description}</div>` : ''}
        ${t.due_date ? `<div style="font-size:12px;margin-top:5px;${overdue?'color:#dc2626;font-weight:600':'color:#9ca3af'}">Due ${formatDate(t.due_date)}${overdue?' · Overdue':''}</div>` : ''}
      </div>
      <button onclick="deleteTask('${t.id}')" style="padding:5px 8px;border:1.5px solid #fecaca;border-radius:6px;background:#fef2f2;font-size:12px;cursor:pointer;color:#dc2626;flex-shrink:0">✕</button>
    </div>`;
}

function filterTasks() {
  let list = allTasks;
  if (currentTab !== 'all') list = list.filter(t=>t.status===currentTab);
  document.getElementById('tasksList').innerHTML = list.length ? list.map(taskHTML).join('') : '<div style="color:#9ca3af;font-size:14px;padding:20px 0">No tasks found.</div>';
}

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterTasks();
}

function updateStats() {
  document.getElementById('s-pending').textContent = allTasks.filter(t=>t.status==='pending').length;
  document.getElementById('s-inprog').textContent  = allTasks.filter(t=>t.status==='in_progress').length;
  document.getElementById('s-done').textContent    = allTasks.filter(t=>t.status==='completed').length;
}

async function toggleTask(id, currentStatus) {
  const next = currentStatus === 'completed' ? 'pending' : currentStatus === 'pending' ? 'in_progress' : 'completed';
  try {
    await API.updateTask(id, { status: next });
    allTasks = allTasks.map(t=>t.id===id?{...t,status:next}:t);
    updateStats(); filterTasks();
  } catch(e) { showToast(e.message,'error'); }
}

async function loadTasks() {
  document.getElementById('topbarName').textContent = Auth.getUser().full_name;
  try {
    const [tasksRes, casesRes] = await Promise.all([API.getTasks(), API.getCases()]);
    allTasks = tasksRes.tasks;
    updateStats(); filterTasks();
    const sel = document.getElementById('m-case');
    casesRes.cases.forEach(c => { sel.innerHTML += `<option value="${c.id}">${c.case_number} – ${c.title}</option>`; });
  } catch(err) { console.error(err); }
}

function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeOnOverlay(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }

async function createTask() {
  const body = {
    case_id:     document.getElementById('m-case').value,
    title:       document.getElementById('m-title').value.trim(),
    description: document.getElementById('m-desc').value.trim(),
    due_date:    document.getElementById('m-due').value || null,
    priority:    document.getElementById('m-priority').value,
  };
  if (!body.case_id || !body.title) { showToast('Case and title required','error'); return; }
  try {
    const { task } = await API.createTask(body);
    allTasks.unshift(task);
    updateStats(); filterTasks();
    closeModal();
    showToast('Task added!');
  } catch(e) { showToast(e.message,'error'); }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await API.deleteTask(id);
    allTasks = allTasks.filter(t=>t.id!==id);
    updateStats(); filterTasks();
    showToast('Task deleted.');
  } catch(e) { showToast(e.message,'error'); }
}

renderSidebar('tasks');
loadTasks();
</script>
</body>
</html>
