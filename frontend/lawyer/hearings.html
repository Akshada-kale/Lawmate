<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LawMate – Hearings</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:9px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'Inter',sans-serif;outline:none;background:#fff}
.toolbar input:focus,.toolbar select:focus{border-color:var(--orange)}
.tab-btn{padding:7px 16px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-mid);font-family:'Inter',sans-serif}
.tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:32px;width:100%;max-width:520px}
.modal h2{font-family:'Playfair Display',serif;font-size:22px;color:#0f172a;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:7px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:'Inter',sans-serif;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--orange)}

.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{padding:10px 20px;border:1.5px solid #e5e7eb;border-radius:9px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-primary{padding:10px 20px;border:none;border-radius:9px;background:#0f172a;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <header class="topbar">
    <span class="topbar-title">Lawyer Dashboard</span>
    <div class="topbar-right">
     <!-- <div class="search-bar"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Search...<span class="search-kbd">⌘K</span></div>
      <button class="notif-btn"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-dot" id="notifDot" style="display:none"></span></button>-->
      <div class="user-badge"><div class="avatar"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div><span id="topbarName">...</span></div>
    </div>
  </header>
  <div class="page-content">
    <div class="page-header"><h1>Hearings</h1><p>Schedule and manage all court hearings</p></div>
    <div class="toolbar">
      <input id="searchInput" placeholder="Search hearings..." oninput="filterHearings()" style="width:220px">
      <button class="tab-btn active" onclick="setTab('all',this)">All</button>
      <button class="tab-btn" onclick="setTab('scheduled',this)">Scheduled</button>
      <button class="tab-btn" onclick="setTab('completed',this)">Completed</button>
      <button class="tab-btn" onclick="setTab('postponed',this)">Postponed</button>
      <button onclick="openModal()" style="margin-left:auto;padding:9px 18px;border-radius:9px;border:none;background:#0f172a;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif">+ Schedule Hearing</button>
    </div>
    <div id="hearingsList"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <h2>Schedule Hearing</h2>
    <div class="form-group"><label>Case *</label><select id="m-case"><option value="">— Select Case —</option></select></div>
    <div class="form-group"><label>Hearing Title *</label><input id="m-title" placeholder="Arguments on property valuation"></div>
    <div class="form-row">
      <div class="form-group"><label>Date *</label><input type="date" id="m-date"></div>
      <div class="form-group"><label>Time *</label><input type="time" id="m-time"></div>
    </div>
    <div class="form-group"><label>Court Room</label><input id="m-room" placeholder="Court Room 5"></div>
    <div class="form-group"><label>Notes</label><textarea id="m-notes" rows="2" placeholder="Additional notes..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="scheduleHearing()">Schedule</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="_sidebar.js"></script>
<script>
let allHearings = [];
let currentTab = 'all';
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function hearingHTML(h) {
  const d = new Date(h.hearing_date);
  const badgeCls = h.status==='completed'?'badge-green':h.status==='postponed'?'badge-red':'badge-yellow';
  return `
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px 24px;display:flex;align-items:center;gap:20px;margin-bottom:12px">
      <div style="width:58px;height:58px;background:#fff7ed;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
        <div style="font-size:22px;font-weight:800;color:#f59e0b;line-height:1.1">${d.getDate()}</div>
        <div style="font-size:11px;font-weight:700;color:#f59e0b;text-transform:uppercase">${MONTHS[d.getMonth()]}</div>
      </div>
      <div style="flex:1">
        <div style="font-size:12px;color:#9ca3af;margin-bottom:4px;display:flex;align-items:center;gap:8px">
          ${h.case?.case_number||'—'} <span class="badge ${badgeCls}">${h.status}</span>
        </div>
        <div style="font-size:15px;font-weight:700;color:#0f172a;margin-bottom:6px">${h.title}</div>
        <div style="display:flex;align-items:center;gap:20px;font-size:13px;color:#6b7280">
          <span style="display:flex;align-items:center;gap:5px"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${h.hearing_time?.slice(0,5)||'—'}</span>
          <span style="display:flex;align-items:center;gap:5px"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${h.court_room||h.case?.court||'—'}</span>
          <span style="display:flex;align-items:center;gap:5px"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>${h.case?.client?.full_name||'—'}</span>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="markDone('${h.id}')" style="padding:7px 14px;border:1.5px solid #e5e7eb;border-radius:8px;background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">Mark Done</button>
        <button onclick="deleteHearing('${h.id}')" style="padding:7px 10px;border:1.5px solid #fecaca;border-radius:8px;background:#fef2f2;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;color:#dc2626">✕</button>
      </div>
    </div>`;
}

function filterHearings() {
  const q  = document.getElementById('searchInput').value.toLowerCase();
  let list = allHearings;
  if (currentTab !== 'all') list = list.filter(h=>h.status===currentTab);
  if (q) list = list.filter(h=>h.title.toLowerCase().includes(q)||(h.case?.case_number||'').toLowerCase().includes(q));
  document.getElementById('hearingsList').innerHTML = list.length
    ? list.map(hearingHTML).join('')
    : '<div style="color:#9ca3af;font-size:14px;padding:20px 0">No hearings found.</div>';
}

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterHearings();
}

async function loadHearings() {
  document.getElementById('topbarName').textContent = Auth.getUser().full_name;
  try {
    const [hearingsRes, casesRes] = await Promise.all([API.getHearings(), API.getCases()]);
    allHearings = hearingsRes.hearings.sort((a,b)=>new Date(a.hearing_date)-new Date(b.hearing_date));
    filterHearings();
    const sel = document.getElementById('m-case');
    casesRes.cases.filter(c=>c.status!=='closed').forEach(c => {
      sel.innerHTML += `<option value="${c.id}">${c.case_number} – ${c.title}</option>`;
    });
  } catch(err) { console.error(err); }
}

function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeOnOverlay(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }

async function scheduleHearing() {
  const body = {
    case_id:      document.getElementById('m-case').value,
    title:        document.getElementById('m-title').value.trim(),
    hearing_date: document.getElementById('m-date').value,
    hearing_time: document.getElementById('m-time').value,
    court_room:   document.getElementById('m-room').value.trim(),
    notes:        document.getElementById('m-notes').value.trim(),
  };
  if (!body.case_id||!body.title||!body.hearing_date||!body.hearing_time) { showToast('Case, title, date and time required','error'); return; }
  try {
    const { hearing } = await API.createHearing(body);
    allHearings.push(hearing);
    allHearings.sort((a,b)=>new Date(a.hearing_date)-new Date(b.hearing_date));
    filterHearings();
    closeModal();
    showToast('Hearing scheduled! Client notified.');
  } catch(e) { showToast(e.message,'error'); }
}

async function markDone(id) {
  try {
    await API.updateHearing(id, { status:'completed' });
    allHearings = allHearings.map(h=>h.id===id?{...h,status:'completed'}:h);
    filterHearings();
    showToast('Hearing marked as completed.');
  } catch(e) { showToast(e.message,'error'); }
}

async function deleteHearing(id) {
  if (!confirm('Delete this hearing?')) return;
  try {
    await API.deleteHearing(id);
    allHearings = allHearings.filter(h=>h.id!==id);
    filterHearings();
    showToast('Hearing deleted.');
  } catch(e) { showToast(e.message,'error'); }
}

renderSidebar('hearings');
loadHearings();
</script>
</body>
</html>
