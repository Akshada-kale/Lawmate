<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LawMate – Clients</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.client-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;transition:box-shadow .2s}
.client-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.07)}
.clients-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.filter-tabs{display:flex;gap:6px;margin-bottom:20px}
.tab-btn{padding:7px 16px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-mid);font-family:'Inter',sans-serif;transition:.15s}
.tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.search-input{padding:9px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:'Inter',sans-serif;outline:none;width:260px}
.search-input:focus{border-color:var(--orange)}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <header class="topbar">
    <span class="topbar-title">Lawyer Dashboard</span>
    <div class="topbar-right">
      <!--<div class="search-bar"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Search...<span class="search-kbd">⌘K</span></div>
      <button class="notif-btn"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-dot" id="notifDot" style="display:none"></span></button>-->
      <div class="user-badge"><div class="avatar"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div><span id="topbarName">...</span></div>
    </div>
  </header>
  <div class="page-content">
    <div class="page-header"><h1>Clients</h1><p>Manage all your clients</p></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <input class="search-input" id="searchInput" placeholder="Search clients..." oninput="filterClients()">
      <div class="filter-tabs">
        <button class="tab-btn active" onclick="setTab('all',this)">All</button>
        <button class="tab-btn" onclick="setTab('pending',this)">Pending <span id="pendCount"></span></button>
        <button class="tab-btn" onclick="setTab('approved',this)">Approved</button>
      </div>
    </div>
    <div class="clients-grid" id="clientsGrid"><div style="color:#9ca3af;font-size:14px;grid-column:1/-1">Loading...</div></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="_sidebar.js"></script>
<script>
let allClients = [];
let currentTab = 'all';

function clientCardHTML(c) {
  const approved = c.is_approved;
  const badge = approved
    ? `<span class="badge badge-green">Approved</span>`
    : `<span class="badge badge-yellow">Pending</span>`;
  const actions = !approved
    ? `<div style="display:flex;gap:8px;margin-top:14px">
        <button onclick="rejectClient('${c.id}',this)" class="btn-outline" style="flex:1;padding:8px;border-radius:8px;border:1.5px solid #e5e7eb;background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">Reject</button>
        <button onclick="approveClient('${c.id}',this)" class="btn-dark" style="flex:1;padding:8px;border-radius:8px;border:none;background:#0f172a;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">Approve</button>
      </div>`
    : `<div style="margin-top:14px"><button class="btn-dark" style="width:100%;padding:8px;border-radius:8px;border:none;background:#0f172a;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">View Details</button></div>`;
  return `
    <div class="client-card" id="client-${c.id}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px">
        <div style="width:44px;height:44px;background:#f1f5f9;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#374151">${c.full_name.charAt(0)}</div>
        ${badge}
      </div>
      <div style="font-size:15px;font-weight:700;color:#0f172a;margin-bottom:4px">${c.full_name}</div>
      <div style="font-size:13px;color:#9ca3af;margin-bottom:4px">${c.email}</div>
      <div style="font-size:13px;color:#6b7280">${c.phone||'—'}</div>
      <div style="font-size:12px;color:#9ca3af;margin-top:4px">${c.city||'—'}</div>
      ${actions}
    </div>`;
}

function filterClients() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = allClients;
  if (currentTab === 'pending')  filtered = filtered.filter(c=>!c.is_approved);
  if (currentTab === 'approved') filtered = filtered.filter(c=>c.is_approved);
  if (q) filtered = filtered.filter(c=>c.full_name.toLowerCase().includes(q)||c.email.toLowerCase().includes(q));
  const grid = document.getElementById('clientsGrid');
  grid.innerHTML = filtered.length ? filtered.map(clientCardHTML).join('') : '<div style="color:#9ca3af;font-size:14px;grid-column:1/-1;padding:20px 0">No clients found.</div>';
}

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterClients();
}

async function approveClient(id, btn) {
  try {
    await API.approveClient(id);
    allClients = allClients.map(c=>c.id===id?{...c,is_approved:true}:c);
    filterClients();
    showToast('Client approved!');
  } catch(e) { showToast(e.message,'error'); }
}

async function rejectClient(id, btn) {
  try {
    await API.rejectClient(id);
    allClients = allClients.filter(c=>c.id!==id);
    filterClients();
    showToast('Client rejected.');
  } catch(e) { showToast(e.message,'error'); }
}

async function loadClients() {
  document.getElementById('topbarName').textContent = Auth.getUser().full_name;
  try {
    const { clients } = await API.getClients();
    allClients = clients;
    const pend = clients.filter(c=>!c.is_approved).length;
    document.getElementById('pendCount').textContent = pend > 0 ? `(${pend})` : '';
    filterClients();
  } catch(err) { console.error(err); }
}

renderSidebar('clients');
loadClients();
</script>
</body>
</html>
