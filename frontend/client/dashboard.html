<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Client Portal – Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <header class="topbar">
    <span class="topbar-title">Client Portal</span>
    <div class="topbar-right">
      <!-- ABOUT <div class="search-bar"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Search...<span class="search-kbd">⌘K</span></div>-->
      <button class="notif-btn" onclick="openNotifs()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-dot" id="notifDot" style="display:none"></span></button>
      <div class="user-badge" id="userBadge"><div class="u-avatar"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div><span id="topbarName">...</span></div>
    </div>
  </header>

  <div class="page-content">
    <div class="page-header">
      <h1 id="greeting">Welcome!</h1>
      <p>Track your cases and stay updated with your legal matters.</p>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div><div class="stat-label">Active Cases</div><div class="stat-val" id="s-cases">—</div></div><div class="stat-icon si-blue"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></div></div>
      <div class="stat-card"><div><div class="stat-label">Upcoming Hearings</div><div class="stat-val" id="s-hearings">—</div></div><div class="stat-icon si-orange"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div></div>
      <div class="stat-card"><div><div class="stat-label">Documents</div><div class="stat-val" id="s-docs">—</div></div><div class="stat-icon si-green"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div></div>
      <div class="stat-card"><div><div class="stat-label">Pending Fees</div><div class="stat-val" id="s-fees">—</div></div><div class="stat-icon si-red"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 0 0 0 4h4a2 2 0 0 1 0 4H8m4 2v2m0-14v2"/></svg></div></div>
    </div>

    <div id="reminderBanner" style="display:none" class="reminder-banner">
      <div class="reminder-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
      <div><div class="reminder-title">Upcoming Hearing Reminder</div><div class="reminder-text" id="reminderText"></div></div>
    </div>

    <div class="section-card">
      <div class="section-head"><h2>My Cases</h2><a href="cases.html" class="view-all">View All →</a></div>
      <div id="casesPreview"><div style="color:#9ca3af;font-size:14px;padding:20px 0">Loading...</div></div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="_sidebar.js"></script>
<script>
const STAGES = ['Filed','Hearing','Evidence','Judgment','Closed'];

function caseCardHTML(c) {
  const steps = STAGES.map((s,i) => {
    const done = i < (c.stage_step||1);
    const circle = done
      ? `<div class="step-circle step-done"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>`
      : `<div class="step-circle step-pending">${i+1}</div>`;
    const line = i < STAGES.length-1
      ? `<div class="prog-connector ${done?'done':'grey'}" style="margin-top:14px"></div>`
      : '';
    return `<div class="step-item">${circle}<div class="step-lbl ${done?'done':''}">${s}</div></div>${line}`;
  }).join('');

  const tags = [];
  if (c.priority==='urgent') tags.push(`<span class="tag-urgent">⚠ Urgent</span>`);
  tags.push(`<span class="tag-stage">${c.status?.charAt(0).toUpperCase()+c.status?.slice(1)||'Filed'}</span>`);

  return `
    <div class="case-card" style="margin-bottom:16px">
      <div class="case-top">
        <div><div class="case-num">${c.case_number}</div><div class="case-title">${c.title}</div></div>
        <div class="case-tags">${tags.join('')}</div>
      </div>
      <div style="display:flex;align-items:flex-start;margin:16px 0 14px">${steps}</div>
      ${c.description_simple ? `<div class="case-desc">${c.description_simple}</div>` : ''}
      <div class="case-meta">
        <span><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${c.court||'—'}</span>
        <span><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${c.next_hearing ? formatDate(c.next_hearing) : formatDate(c.filing_date)}</span>
      </div>
    </div>`;
}

async function loadDashboard() {
  const user = Auth.getUser();
  document.getElementById('greeting').textContent = `Welcome, ${user.full_name.split(' ')[0]}`;
  document.getElementById('topbarName').textContent = user.full_name;

  try {
    const [casesRes, hearingsRes, docsRes, feesRes] = await Promise.all([
      API.getCases(), API.getHearings(), API.getDocs(), API.getFees()
    ]);

    document.getElementById('s-cases').textContent = casesRes.cases.filter(c=>c.status!=='closed').length;
    const upcoming = hearingsRes.hearings.filter(h=>h.status==='scheduled');
    document.getElementById('s-hearings').textContent = upcoming.length;
    document.getElementById('s-docs').textContent = docsRes.documents.length;

    const totalPending = feesRes.fees.reduce((sum,f) => sum + (Number(f.total_fee)-Number(f.paid_amount)), 0);
    document.getElementById('s-fees').textContent = totalPending > 0
      ? (totalPending >= 100000 ? `₹${(totalPending/100000).toFixed(1)}L` : `₹${Math.round(totalPending/1000)}K`)
      : '₹0';

    // Nearest upcoming hearing reminder
    if (upcoming.length > 0) {
      const next = upcoming.sort((a,b)=>new Date(a.hearing_date)-new Date(b.hearing_date))[0];
      document.getElementById('reminderBanner').style.display = 'flex';
      document.getElementById('reminderText').innerHTML =
        `You have a hearing on <strong>${next.hearing_date}</strong> at ${next.hearing_time.slice(0,5)} — ${next.court_room||next.case?.court||'Court'}`;
    }

    // Cases preview (up to 2)
    const preview = casesRes.cases.slice(0,2);
    document.getElementById('casesPreview').innerHTML = preview.length
      ? preview.map(caseCardHTML).join('')
      : '<div style="color:#9ca3af;font-size:14px;padding:20px 0">No cases assigned yet.</div>';

  } catch (err) {
    console.error(err);
  }
}

async function openNotifs() {
  try {
    const { notifications } = await API.getNotifications();
    await API.markAllRead();
    document.getElementById('notifDot').style.display = 'none';
    const unread = notifications.filter(n=>!n.is_read);
    alert(unread.length > 0
      ? unread.map(n=>`• ${n.title}: ${n.message}`).join('\n\n')
      : 'No new notifications.');
  } catch {}
}

renderSidebar('dashboard');
loadDashboard();
</script>
</body>
</html>
