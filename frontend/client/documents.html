<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Client Portal – Documents</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <header class="topbar">
    <span class="topbar-title">Client Portal</span>
    <div class="topbar-right">
      <!-- ABOUT <div class="search-bar"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Search...<span class="search-kbd">⌘K</span></div>
      <button class="notif-btn"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-dot" id="notifDot" style="display:none"></span></button>-->
      <div class="user-badge"><div class="u-avatar"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div><span id="topbarName">...</span></div>
    </div>
  </header>
  <div class="page-content">
    <div class="page-header"><h1>My Documents</h1><p>Access and download your case documents</p></div>
    <div id="docsList"></div>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="_sidebar.js"></script>
<script>
function docHTML(d) {
  return `
    <div class="doc-row">
      <div class="doc-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
      <div class="doc-info">
        <div class="doc-name">${d.name}</div>
        <div class="doc-meta">${d.case?.case_number||'—'} • ${d.file_size||'—'}</div>
      </div>
      <div class="doc-right">
        <span class="doc-type">${d.doc_type}</span>
        <a href="${d.file_url}" target="_blank" class="btn-dl">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </a>
      </div>
    </div>`;
}

async function loadDocs() {
  document.getElementById('topbarName').textContent = Auth.getUser().full_name;
  try {
    const { documents } = await API.getDocs();
    document.getElementById('docsList').innerHTML = documents.length
      ? documents.map(docHTML).join('')
      : '<div style="color:#9ca3af;font-size:14px;padding:20px 0">No documents uploaded yet.</div>';
  } catch (err) { console.error(err); }
}

renderSidebar('documents');
loadDocs();
</script>
</body>
</html>
