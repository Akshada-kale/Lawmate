<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Client Portal – Fee Status</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <header class="topbar">
    <span class="topbar-title">Client Portal</span>
    <div class="topbar-right">
      <!-- ABOUT <div class="search-bar"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Search...<span class="search-kbd">⌘K</span></div>
      <button class="notif-btn"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-dot" id="notifDot" style="display:none"></span></button>-->
      <div class="user-badge"><div class="u-avatar"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div><span id="topbarName">...</span></div>
    </div>
  </header>
  <div class="page-content">
    <div class="page-header"><h1>Fee Status</h1><p>View your payment history and pending amounts</p></div>
    <div id="feesList"></div>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="_sidebar.js"></script>
<script>
function feeCardHTML(f) {
  const total  = Number(f.total_fee)||0;
  const paid   = Number(f.paid_amount)||0;
  const pending= total - paid;
  const pct    = total > 0 ? Math.round((paid/total)*100) : 0;
  return `
    <div class="fee-card">
      <div class="fee-case-num">${f.case?.case_number||'—'}</div>
      <div class="fee-head-row">
        <div class="fee-head-title">Payment Progress</div>
        <div class="fee-ratio">${formatMoney(paid)} / ${formatMoney(total)}</div>
      </div>
      <div class="fee-bar-bg"><div class="fee-bar-fill" style="width:${pct}%"></div></div>
      <div class="fee-cols">
        <div class="fee-col">
          <div class="fee-col-label">Total</div>
          <div class="fee-col-val">${formatMoney(total)}</div>
        </div>
        <div class="fee-col fee-col-green">
          <div class="fee-col-label">Paid</div>
          <div class="fee-col-val green">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            ${formatMoney(paid)}
          </div>
        </div>
        <div class="fee-col fee-col-yellow">
          <div class="fee-col-label">Pending</div>
          <div class="fee-col-val amber">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${formatMoney(pending)}
          </div>
        </div>
      </div>
    </div>`;
}

async function loadFees() {
  document.getElementById('topbarName').textContent = Auth.getUser().full_name;
  try {
    const { fees } = await API.getFees();
    document.getElementById('feesList').innerHTML = fees.length
      ? fees.map(feeCardHTML).join('')
      : '<div style="color:#9ca3af;font-size:14px;padding:20px 0">No fee records yet.</div>';
  } catch (err) { console.error(err); }
}

renderSidebar('fees');
loadFees();
</script>
</body>
</html>
