<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Client Portal – Hearings</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <header class="topbar">
    <span class="topbar-title">Client Portal</span>
    <div class="topbar-right">
     <!-- ABOUT <div class="search-bar"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Search...<span class="search-kbd">⌘K</span></div>
      <button class="notif-btn"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-dot" id="notifDot" style="display:none"></span></button>-->
      <div class="user-badge"><div class="u-avatar"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div><span id="topbarName">...</span></div>
    </div>
  </header>
  <div class="page-content">
    <div class="page-header"><h1>My Hearings</h1><p>Your upcoming and past court dates</p></div>
    <div id="hearingsList"></div>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="_sidebar.js"></script>
<script>
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function hearingHTML(h) {
  const d = new Date(h.hearing_date);
  const day = d.getDate();
  const mon = MONTHS[d.getMonth()];
  const badgeColor = h.status==='completed' ? 'badge-green' : 'badge-blue';
  return `
    <div class="hearing-row">
      <div class="date-box"><div class="date-day">${day}</div><div class="date-mon">${mon}</div></div>
      <div class="hearing-body">
        <div class="h-case">${h.case?.case_number||'—'} <span class="badge ${badgeColor}">${h.status}</span></div>
        <div class="h-title">${h.title}</div>
        <div class="h-meta">
          <span><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${h.hearing_time?.slice(0,5)||'—'}</span>
          <span><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${h.court_room||h.case?.court||'—'}</span>
        </div>
      </div>
    </div>`;
}

async function loadHearings() {
  document.getElementById('topbarName').textContent = Auth.getUser().full_name;
  try {
    const { hearings } = await API.getHearings();
    const sorted = [...hearings].sort((a,b) => new Date(b.hearing_date)-new Date(a.hearing_date));
    document.getElementById('hearingsList').innerHTML = sorted.length
      ? sorted.map(hearingHTML).join('')
      : '<div style="color:#9ca3af;font-size:14px;padding:20px 0">No hearings scheduled yet.</div>';
  } catch (err) { console.error(err); }
}

renderSidebar('hearings');
loadHearings();
</script>
</body>
</html>
